substitutions:
  _REGION: asia-southeast1
  _REPOSITORY: small-sme-erp-backend
  _SERVICE: small-sme-erp-backend
  _REPO_URL: https://github.com/kard80/small-sme-erp-backend.git

steps:
  - id: clone
    name: gcr.io/cloud-builders/git
    args:
      - clone
      - --branch=$BRANCH_NAME
      - --depth=1
      - $_REPO_URL
      - .

  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE:$COMMIT_SHA
      - --tag
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE:latest
      - --cache-from
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE:latest

options:
  logging: CLOUD_LOGGING_ONLY
